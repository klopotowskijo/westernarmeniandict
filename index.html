<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Արեւմտահայ Բառարան · Western Armenian Dictionary</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f0e8;
    color: #1a1208;
    padding: 24px 16px;
    min-height: 100vh;
  }

  .container { max-width: 760px; margin: 0 auto; }

  h1 { color: #8b1a1a; font-size: 26px; margin-bottom: 4px; }
  .subtitle { color: #8a7560; font-size: 15px; margin-bottom: 6px; }
  .count { font-size: 13px; color: #a0906e; margin-bottom: 22px; }

  .search-wrap { position: relative; }

  .search-controls {
    display: flex;
    margin-bottom: 8px;
  }

  .search-mode {
    padding: 6px 12px;
    border: 1px solid #c8b89a;
    background: white;
    cursor: pointer;
    font-size: 14px;
    transition: 0.15s;
  }

  .search-mode.active {
    background: #8b1a1a;
    color: white;
    border-color: #8b1a1a;
  }

  .search-mode:first-child { border-radius: 4px 0 0 4px; }
  .search-mode:last-child { border-radius: 0 4px 4px 0; border-left: none; }

  #search {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #c8b89a;
    border-radius: 4px;
  }

  #suggestions {
    position: absolute;
    width: 100%;
    background: white;
    border: 1px solid #c8b89a;
    border-top: none;
    max-height: 260px;
    overflow-y: auto;
    display: none;
    z-index: 10;
  }

  .suggestion {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
  }

  .suggestion:hover { background: #f0e7d9; }

  .result {
    background: white;
    padding: 26px;
    border-radius: 8px;
    margin-top: 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    display: none;
  }

  .word-title { font-size: 42px; }
  .word-pos { font-style: italic; color: #8a7560; margin-top: 2px; }

  .section-label {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: #8b1a1a;
    font-weight: bold;
  }

  .definitions ol {
    padding-left: 20px;
    line-height: 1.8;
    margin-top: 6px;
  }

  .etymology-box {
    margin-top: 8px;
    background: #ede7d9;
    padding: 12px;
    border-left: 3px solid #8b1a1a;
  }

  .not-found {
    text-align: center;
    padding: 28px;
    color: #8a7560;
  }

  .loading-spinner {
    display: none;
    margin-bottom: 12px;
    color: #8b1a1a;
  }

  .loading-spinner.active { display: block; }

  #graphSection {
    display: none;
    margin-top: 20px;
  }

  #graphContainer {
    height: 600px;
    border: 1px solid #c8b89a;
    border-radius: 6px;
  }

  button {
    cursor: pointer;
  }

  #showGraphBtn {
    margin-bottom: 12px;
    padding: 10px 16px;
    background: #8b1a1a;
    color: white;
    border: none;
    border-radius: 4px;
  }
</style>

<script src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
</head>

<body>
<div class="container">

<h1>Արեւմտահայ Բառարան</h1>
<div class="subtitle">Western Armenian Etymological Dictionary</div>
<div class="count" id="count">Loading dictionary…</div>

<div class="loading-spinner" id="loadingSpinner">Searching…</div>

<button id="showGraphBtn" style="display:none;">Show Language Tree Graph</button>

<div class="search-wrap">
  <div class="search-controls">
    <button id="wordSearchBtn" class="search-mode active">Word Search</button>
    <button id="langSearchBtn" class="search-mode">Language Search</button>
  </div>

  <input type="text" id="search" placeholder="Search…" autocomplete="off">
  <div id="suggestions"></div>
</div>

<div class="result" id="result"></div>

<div id="graphSection">
  <h2>Language Tree Graph</h2>
  <div id="graphContainer"></div>
</div>

</div>

<script>
/* =========================
   STATE
========================= */

let dictionary = [];
let titleIndex = {};
let allTitles = [];
let searchMode = "word";

let graphData = null;
let network = null;

let etyCache = {};

/* =========================
   CLEAN ETYMOLOGY (FAST + SAFE)
========================= */

function cleanEtymology(text) {
  if (!text) return "";

  return text
    .replace(/\{\{[^}]+\}\}/g, "")
    .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, "$2")
    .replace(/\[\[([^\]]+)\]\]/g, "$1")
    .replace(/\s+/g, " ")
    .trim();
}

/* =========================
   PARSERS
========================= */

function parseDefinitions(wikitext) {
  const m = wikitext.match(/==Armenian==\n([\s\S]*?)(?=\n==|$)/);
  if (!m) return [];

  return m[1]
    .split("\n")
    .filter(l => l.startsWith("#"))
    .map(l => l.replace(/^#/, "").trim());
}

function parsePOS(wikitext) {
  const m = wikitext.match(/==Armenian==\n([\s\S]*?)(?=\n==|$)/);
  if (!m) return "";

  if (m[1].includes("Noun")) return "noun";
  if (m[1].includes("Verb")) return "verb";
  if (m[1].includes("Adjective")) return "adjective";

  return "";
}

function parseEtymology(entry) {
  if (etyCache[entry.title]) return etyCache[entry.title];

  let t = entry.etymology?.[0]?.text || "";
  t = cleanEtymology(t);

  etyCache[entry.title] = t;
  return t;
}

/* =========================
   LOOKUP
========================= */

function lookup(word) {
  const entry = titleIndex[word];
  const el = document.getElementById("result");

  el.style.display = "block";

  if (!entry) {
    el.innerHTML = `<div class="not-found">Not found: ${word}</div>`;
    return;
  }

  const defs = parseDefinitions(entry.wikitext || "");
  const pos = parsePOS(entry.wikitext || "");
  const ety = parseEtymology(entry);

  let html = `<div class="word-title">${entry.title}</div>`;
  if (pos) html += `<div class="word-pos">${pos}</div>`;

  if (defs.length) {
    html += `<div class="section-label">Definition</div><ol>`;
    for (const d of defs) html += `<li>${d}</li>`;
    html += `</ol>`;
  }

  html += `<div class="section-label">Etymology</div>
           <div class="etymology-box">${ety || "—"}</div>`;

  el.innerHTML = html;
}

window.lookup = lookup;

/* =========================
   SUGGESTIONS (FIXED EVENT BINDING)
========================= */

function showSuggestions(q) {
  const box = document.getElementById("suggestions");
  if (!q) return box.style.display = "none";

  const matches = allTitles
    .filter(t => t.toLowerCase().includes(q.toLowerCase()))
    .slice(0, 10);

  box.innerHTML = "";

  matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.textContent = m;
    div.addEventListener("click", () => lookup(m));
    box.appendChild(div);
  });

  box.style.display = "block";
}

/* =========================
   INIT DICTIONARY
========================= */

function loadDictionary() {
  fetch("western_armenian_wiktionary.json")
    .then(r => r.json())
    .then(data => {
      dictionary = data;

      for (const e of data) {
        titleIndex[e.title] = e;
      }

      allTitles = data.map(e => e.title);

      document.getElementById("count").textContent =
        data.length.toLocaleString() + " entries";

      document.getElementById("showGraphBtn").style.display = "block";
    });
}

/* =========================
   SEARCH INPUT (DEBOUNCED)
========================= */

let searchTimeout = null;

document.getElementById("search").addEventListener("input", e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    showSuggestions(e.target.value.trim());
  }, 120);
});

document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") lookup(e.target.value.trim());
});

/* =========================
   MODE BUTTONS
========================= */

document.getElementById("wordSearchBtn").onclick = () => {
  searchMode = "word";
  document.getElementById("wordSearchBtn").classList.add("active");
  document.getElementById("langSearchBtn").classList.remove("active");
};

document.getElementById("langSearchBtn").onclick = () => {
  searchMode = "language";
  document.getElementById("langSearchBtn").classList.add("active");
  document.getElementById("wordSearchBtn").classList.remove("active");
};

/* =========================
   GRAPH
========================= */

document.getElementById("showGraphBtn").onclick = async () => {
  const sec = document.getElementById("graphSection");
  const container = document.getElementById("graphContainer");

  sec.style.display = "block";

  if (!graphData) {
    graphData = await fetch("graph_web.json").then(r => r.json());
  }

  const nodes = graphData.nodes.map((n, i) => ({
    id: i,
    label: n.id
  }));

  new vis.Network(container, { nodes, edges: [] }, {
    physics: true
  });
};

/* =========================
   OUTSIDE CLICK
========================= */

document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) {
    document.getElementById("suggestions").style.display = "none";
  }
});

/* =========================
   LOAD
========================= */

loadDictionary();

/* =========================
   NAYIRI FORMS
========================= */

fetch("nayiri_forms.json")
  .then(r => r.json())
  .then(d => window.nayiriForms = d);

</script>

</body>
</html>
