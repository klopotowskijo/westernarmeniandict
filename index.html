<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Western Armenian Etymology Dictionary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f3eee2;
      --ink: #2f2922;
      --ink-soft: #756a5c;
      --line: #d8ccbb;
      --card: #fffdf8;
      --accent: #8a4f28;
      --accent-soft: #efe2cf;
      --warning: #8d2a1e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "EB Garamond", Georgia, serif;
      background:
        radial-gradient(circle at 5% 0%, #fff8e9 0%, transparent 40%),
        radial-gradient(circle at 95% 10%, #efe1cc 0%, transparent 38%),
        linear-gradient(180deg, #f8f2e6 0%, var(--paper) 100%);
      min-height: 100vh;
    }
    .container {
      width: min(980px, 92vw);
      margin: 2.2rem auto;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: 0 12px 45px rgba(66, 40, 18, 0.12);
    }
    .topbar {
      border-bottom: 1px solid var(--line);
      padding: 1.3rem 1.6rem 1.1rem;
      background: linear-gradient(180deg, #fffdf8 0%, #faf3e8 100%);
      position: relative;
    }
    .topbar::after {
      content: "";
      display: block;
      margin-top: 0.72rem;
      height: 8px;
      background:
        linear-gradient(90deg, transparent 0 2%, #ccb79b 2% 3%, transparent 3% 11%, #ccb79b 11% 12%, transparent 12% 88%, #ccb79b 88% 89%, transparent 89% 97%, #ccb79b 97% 98%, transparent 98% 100%);
      opacity: 0.8;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .subtitle {
      margin-top: 0.25rem;
      color: var(--ink-soft);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.015em;
    }
    .controls {
      padding: 1rem 1.6rem;
      border-bottom: 1px solid var(--line);
      background: #f9f3e8;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 0.75rem;
    }
    #search {
      width: 100%;
      font-family: "EB Garamond", Georgia, serif;
      font-size: 1.15rem;
      padding: 0.6rem 0.72rem;
      border: 1px solid #c7b9a7;
      border-radius: 0;
      background: #fffefb;
      color: var(--ink);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    #search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138, 79, 40, 0.14);
    }
    #suggestions {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      border: 1px solid #cabba8;
      border-top: none;
      background: #fffdf9;
      z-index: 10;
      display: none;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: 0 12px 28px rgba(56, 33, 14, 0.12);
    }
    .keyboard-wrap {
      margin-bottom: 0.75rem;
    }
    #toggleKeyboardBtn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 0.28rem 0.48rem;
    }
    .keyboard-panel {
      margin-top: 0.45rem;
      border: 1px solid #cdbca6;
      background: #fff9ef;
      padding: 0.45rem;
      display: none;
    }
    .keyboard-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.28rem;
      margin-bottom: 0.28rem;
    }
    .keyboard-row:last-child {
      margin-bottom: 0;
    }
    .kbd-key {
      min-width: 2rem;
      padding: 0.28rem 0.4rem;
      font-size: 1rem;
      font-family: "EB Garamond", serif;
      background: #fffdf8;
      border: 1px solid #cbb79b;
      color: #3f2f1f;
      line-height: 1;
    }
    .kbd-key.action {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.72rem;
      min-width: 3.2rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .kbd-key.wide {
      min-width: 5.2rem;
    }
    .suggestion {
      padding: 0.45rem 0.62rem;
      cursor: pointer;
      border-bottom: 1px solid #ede2d3;
      font-size: 1.02rem;
    }
    .suggestion:hover { background: #f2e8da; }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.48rem;
      align-items: center;
      font-family: "IBM Plex Sans", sans-serif;
    }
    button {
      border: 1px solid #bda98e;
      border-radius: 0;
      background: #fbf6ec;
      color: #4f3e2c;
      padding: 0.38rem 0.62rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background-color 0.16s ease, color 0.16s ease;
    }
    button.active,
    button:hover {
      background: var(--accent-soft);
      color: #2f2010;
    }
    #count {
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--ink-soft);
      font-size: 0.86rem;
      margin-bottom: 0.45rem;
    }
    #result {
      padding: 1.25rem 1.6rem 1.6rem;
      min-height: 130px;
    }
    .entry-card {
      border: 1px solid var(--line);
      background: #fffefb;
      animation: entry-fade 0.22s ease;
    }
    .entry-head {
      padding: 0.82rem 0.92rem;
      border-bottom: 1px solid var(--line);
      background: #fcf6ea;
    }
    .word-title {
      font-size: clamp(1.85rem, 3vw, 2.55rem);
      font-weight: 700;
      line-height: 1.06;
      margin-bottom: 0.12rem;
      color: #2b2119;
    }
    .word-pos {
      font-family: "IBM Plex Sans", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
      color: var(--ink-soft);
    }
    .entry-tools {
      margin-top: 0.45rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .permalink-btn {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.68rem;
      border: 1px solid #bda181;
      background: #fff3e1;
      color: #5f472d;
      padding: 0.2rem 0.36rem;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .permalink-btn:hover,
    .permalink-btn:focus-visible {
      background: #f5dec0;
      outline: none;
    }
    .permalink-status {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.69rem;
      color: #6c5a47;
      min-height: 1em;
    }
    .entry-content {
      padding: 0.96rem 0.92rem 1rem;
      font-size: 1.08rem;
      line-height: 1.44;
    }
    .etymology-lineage {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin: 0 0 0.48rem;
      align-items: center;
      font-family: "IBM Plex Sans", sans-serif;
    }
    .lineage-node {
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid #cdbba0;
      background: #f8eedf;
      color: #604a34;
      padding: 0.19rem 0.36rem;
    }
    .lineage-arrow {
      color: #806a53;
      font-size: 0.75rem;
      line-height: 1;
    }
    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      margin-top: 0.5rem;
      padding-top: 0.52rem;
      border-top: 1px dashed #deceb7;
    }
    .meta-pill {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border: 1px solid #c8b89f;
      background: #fbf4e7;
      padding: 0.2rem 0.35rem;
      color: #715c45;
    }
    .source-chip {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.69rem;
      border: 1px solid #b99e80;
      background: #fff2de;
      color: #543c24;
      padding: 0.21rem 0.4rem;
      cursor: pointer;
      transition: background-color 0.14s ease;
    }
    .source-chip:hover,
    .source-chip:focus-visible {
      background: #f3dcc0;
      outline: none;
    }
    .lang-results-title {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.84rem;
      letter-spacing: 0.03em;
      color: #665746;
      margin-bottom: 0.55rem;
    }
    .lang-result-list {
      list-style: none;
      margin: 0;
      padding: 0;
      border: 1px solid var(--line);
      background: #fffefb;
    }
    .lang-result-item {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.5rem 0.62rem;
      border-bottom: 1px solid #eee2d2;
      align-items: baseline;
    }
    .lang-result-item:last-child { border-bottom: none; }
    .lang-result-word {
      font-size: 1.1rem;
      cursor: pointer;
      color: #2e241b;
    }
    .lang-result-word:hover { color: var(--accent); }
    .lang-result-meta {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.72rem;
      color: #6e5f4f;
    }
    .section-label {
      font-family: "IBM Plex Sans", sans-serif;
      text-transform: uppercase;
      font-size: 0.69rem;
      letter-spacing: 0.08em;
      color: #6f5f4e;
      margin: 0.75rem 0 0.22rem;
      display: flex;
      align-items: center;
      gap: 0.42rem;
    }
    .section-label::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, #dac9b2 0%, transparent 100%);
    }
    .entry-content ol,
    .entry-content ul {
      margin: 0;
      padding-left: 1.4rem;
    }
    .entry-content li { margin: 0.22rem 0; }
    .etymology-box {
      background: #fff7ea;
      border-left: 3px solid var(--accent);
      padding: 0.5rem 0.62rem;
      margin-bottom: 0.45rem;
    }
    .nayiri-forms { margin: 0.35rem 0 0; }
    /* Source badges */
    .source-badge {
      display: inline-block;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.1rem 0.38rem;
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 0.4rem;
      line-height: 1.5;
    }
    .source-badge.wiktionary {
      background: #e8f0fa;
      color: #3a6399;
      border: 1px solid #b8cde8;
    }
    .source-badge.nayiri {
      background: #f0f7e8;
      color: #3d6b2f;
      border: 1px solid #b8d8a0;
    }
    .ety-confidence {
      display: inline-block;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.36rem;
      border-radius: 3px;
      margin-left: 0.25rem;
      border: 1px solid transparent;
      line-height: 1.5;
    }
    .ety-confidence.high {
      background: #edf6e8;
      color: #315f28;
      border-color: #b8d7a8;
    }
    .ety-confidence.medium {
      background: #fff6e6;
      color: #7d5a24;
      border-color: #e3cda0;
    }
    .ety-confidence.low {
      background: #fdeeee;
      color: #8a3737;
      border-color: #e3b4b4;
    }
    .ety-sources {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.72rem;
      color: #6f5e4c;
      margin: 0.2rem 0 0.55rem;
    }
    .attestation-note {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.72rem;
      color: #5c4d3f;
      margin: -0.15rem 0 0.5rem;
    }
    /* Nayiri section panel */
    .nayiri-panel {
      margin-top: 0.3rem;
      padding: 0.55rem 0.7rem;
      background: #f7fdf3;
      border-left: 3px solid #8dbb6f;
      border-radius: 0 4px 4px 0;
    }
    .nayiri-gloss {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.82rem;
      color: #3d4a2e;
      margin-bottom: 0.3rem;
    }
    .nayiri-pos {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.72rem;
      color: #6a7a5e;
      font-style: italic;
      margin-bottom: 0.4rem;
    }
    .nayiri-forms-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
      font-family: "EB Garamond", serif;
      font-size: 0.85rem;
    }
    .nayiri-form-pill {
      background: #e8f2e0;
      border: 1px solid #b8d4a0;
      border-radius: 3px;
      padding: 0.05rem 0.35rem;
      color: #2d4a20;
    }
    .not-found {
      color: var(--warning);
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      border: 1px solid #d8bbb4;
      background: #fff4f2;
      padding: 0.62rem 0.72rem;
    }
    .did-you-mean {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: #634637;
    }
    .suggest-link {
      border: none;
      background: none;
      padding: 0;
      margin-right: 0.45rem;
      color: var(--accent);
      border-bottom: 1px dotted var(--accent);
      cursor: pointer;
      font-family: "EB Garamond", serif;
      font-size: 1rem;
      line-height: 1.2;
    }
    .suggest-link:hover {
      color: #692910;
      border-bottom-style: solid;
    }
    #graphSection {
      margin: 0 1.6rem 1.6rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--line);
    }
    .graph-controls {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
      font-family: "IBM Plex Sans", sans-serif;
    }
    .graph-mode-btn {
      font-size: 0.74rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .graph-note {
      font-size: 0.73rem;
      color: #6f5f4f;
    }
    .graph-lang-input {
      min-width: 220px;
      border: 1px solid #c7b29a;
      background: #fffef9;
      color: #4a3a2a;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.78rem;
      padding: 0.34rem 0.45rem;
    }
    .graph-language-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.6rem;
      margin: 0 0 0.7rem;
      padding: 0.55rem 0.6rem;
      border: 1px solid var(--line);
      background: #fffaf1;
      max-height: 144px;
      overflow-y: auto;
    }
    .graph-lang-option {
      display: inline-flex;
      align-items: center;
      gap: 0.28rem;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.76rem;
      color: #5a4a39;
      white-space: nowrap;
    }
    .graph-lang-option input {
      margin: 0;
      accent-color: #8a4f28;
    }
    .graph-selected {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.73rem;
      color: #6b5a48;
      margin: 0 0 0.55rem;
    }
    .graph-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.38rem;
      margin: 0 0 0.55rem;
    }
    .graph-preset-btn {
      font-size: 0.7rem;
      padding: 0.26rem 0.44rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .graph-mini-btn {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.3rem 0.48rem;
    }
    #graphContainer { height: 460px; border: 1px solid var(--line); background: #fffef9; }
        .pronunciation {
          font-family: "IBM Plex Sans", sans-serif;
          font-size: 0.88rem;
          color: #5a4a39;
          margin: 0.1rem 0 0.3rem;
          letter-spacing: 0.02em;
        }
        .pron-label {
          font-size: 0.68rem;
          text-transform: uppercase;
          letter-spacing: 0.07em;
          color: #8a7a68;
          margin-right: 0.35rem;
        }
        .word-links {
          display: flex;
          flex-wrap: wrap;
          gap: 0.28rem 0.42rem;
          margin-top: 0.2rem;
        }
        .word-link {
          font-family: "EB Garamond", serif;
          font-size: 0.96rem;
          color: var(--accent);
          border-bottom: 1px dotted var(--accent);
          cursor: pointer;
          background: none;
          border-top: none;
          border-left: none;
          border-right: none;
          padding: 0;
          line-height: 1.4;
          transition: color 0.12s;
        }
        .word-link:hover { color: #692910; border-bottom-style: solid; }
    #randomWordBtn {
      background: transparent;
      border: 1px dashed var(--accent);
      color: var(--accent);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      padding: 0.34rem 0.7rem;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }
    #randomWordBtn:hover {
      background: var(--accent);
      color: #fff;
    }
    @keyframes entry-fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 760px) {
      .container { width: 100%; margin: 0; border: none; box-shadow: none; }
      .topbar,
      .controls,
      #result,
      #graphSection { padding-left: 0.95rem; padding-right: 0.95rem; }
      .entry-content { font-size: 1.04rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h1>Western Armenian Etymology Dictionary</h1>
      <div class="subtitle">Արեւմտահայերէն Ստուգաբանական Բառարան</div>
    </header>
    <section class="controls">
      <div id="count"></div>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search for a word..." autocomplete="off" />
        <div id="suggestions"></div>
      </div>
      <div class="keyboard-wrap">
        <button id="toggleKeyboardBtn" type="button" aria-expanded="false">Armenian Keyboard</button>
        <div id="armenianKeyboard" class="keyboard-panel" aria-hidden="true"></div>
      </div>
      <div class="button-row">
        <button id="wordSearchBtn" class="active">Word Search</button>
        <button id="langSearchBtn">Language Search</button>
        <button id="showGraphBtn" style="display:none">Show Etymology Graph</button>
        <button id="openLanguageTreeBtn" style="display:none">Language Tree</button>
        <button id="randomWordBtn" title="Load a random entry">&#9684; Random</button>
      </div>
    </section>
    <main id="result"></main>
    <section id="graphSection" style="display:none">
      <h2>Etymology Graph</h2>
      <div class="graph-controls">
        <button id="graphModeLanguageBtn" class="graph-mode-btn active">Language Tree</button>
        <button id="graphModeLineageBtn" class="graph-mode-btn">Word Lineage</button>
        <button id="graphModeTreeBtn" class="graph-mode-btn">Strict Tree</button>
        <input id="graphLangSearch" class="graph-lang-input" type="text" placeholder="Search languages..." />
        <button id="graphLangApplyBtn" class="graph-mini-btn">Apply</button>
        <button id="graphLangClearBtn" class="graph-mini-btn">All Languages</button>
        <span id="graphNote" class="graph-note"></span>
      </div>
      <div class="graph-presets">
        <button class="graph-preset-btn" data-graph-preset="Armenian|Classical Armenian">Armenian Layers</button>
        <button class="graph-preset-btn" data-graph-preset="Turkish|Ottoman Turkish">Turkic</button>
        <button class="graph-preset-btn" data-graph-preset="Persian">Persian</button>
        <button class="graph-preset-btn" data-graph-preset="Russian">Russian</button>
        <button class="graph-preset-btn" data-graph-preset="Arabic">Arabic</button>
        <button class="graph-preset-btn" data-graph-preset="French">French</button>
      </div>
      <div id="graphSelectedSummary" class="graph-selected">Showing all source languages</div>
      <div id="graphLanguagePanel" class="graph-language-panel"></div>
      <div id="graphContainer"></div>
    </section>
  </div>
  <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    let dictionary = [];
    let titleIndex = {};
    let allTitles = [];
    let searchMode = "word";
    let graphData = null;
    let network = null;
    let etyCache = {};
    let sourceLanguageList = [];
    let graphMode = "language";
    let currentWord = "";
    let graphIndex = null;
    let graphLanguageSearchTerm = "";
    let graphAvailableLanguages = [];
    let graphSelectedLanguages = new Set();
    let graphVisible = false;
    let pendingRandomRequest = false;
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function cleanEtymology(text) {
      if (!text) return "";
      return text
        .replace(/\{\{[^}]+\}\}/g, "")
        .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, "$2")

        const langs = m.langs.length ? m.langs.join(", ") : "unspecified";
        const encodedWord = encodeURIComponent(m.entry.title);
        html += `<li class="lang-result-item"><span class="lang-result-word" data-word="${encodedWord}">${escapeHtml(m.entry.title)}</span><span class="lang-result-meta">${escapeHtml(langs)}</span></li>`;
      }
      html += `</ul>`;
      el.innerHTML = html;
      if (syncUrl) updateUrlState("language", cleanQuery);
    }
    function lookup(word, syncUrl = true) {
      const entry = titleIndex[word];
      const el = document.getElementById("result");
      document.getElementById("suggestions").style.display = "none";
      el.style.display = "block";
      if (!entry) {
        const suggestions = getDidYouMeanWords(word, 4);
        let suggestionHtml = "";
        if (suggestions.length) {
          suggestionHtml = `<div class="did-you-mean">Did you mean: ${suggestions.map(w => `<button type="button" class="suggest-link" data-word="${encodeURIComponent(w)}">${escapeHtml(w)}</button>`).join("")}</div>`;
        }
        el.innerHTML = `<div class="not-found">Not found: ${escapeHtml(word)}${suggestionHtml}</div>`;
        if (syncUrl) updateUrlState("word", word);
        return;
      }
      const defs = parseDefinitions(entry.wikitext || "");
      const pos = parsePOS(entry.wikitext || "");
      const pron = parsePronunciation(entry.wikitext || "");
      const altForms = parseWikitextSection(entry.wikitext || "", "Alternative forms");
      const derivedTerms = parseWikitextSection(entry.wikitext || "", "Derived terms");
      const relatedTerms = parseWikitextSection(entry.wikitext || "", "Related terms");
      const seeAlso = parseWikitextSection(entry.wikitext || "", "See also");
      const ety = parseEtymology(entry);
      const etyConfidence = inferEtymologyConfidence(entry, ety);
      const attestation = inferAttestation(entry, ety);
      const etySources = getEtymologySourceList(entry);
      const srcLangs = getSourceLanguages(entry);
      const lineage = getEtymologyLineage(entry);
      currentWord = entry.title;
      let html = `<article class="entry-card"><div class="entry-head"><div class="word-title">${escapeHtml(entry.title)}</div>`;
      if (pos) html += `<div class="word-pos">${escapeHtml(pos)}</div>`;
      if (pron) html += `<div class="pronunciation"><span class="pron-label">Pron.</span>${escapeHtml(pron)}</div>`;
      const encodedTitle = encodeURIComponent(entry.title);
      html += `<div class="entry-tools"><button type="button" class="permalink-btn" data-word="${encodedTitle}">Permalink</button><span class="permalink-status" id="permalinkStatus"></span></div>`;
      html += `</div><div class="entry-content">`;
      // Prefer explicit definition field if present
      if (entry.definition && Array.isArray(entry.definition) && entry.definition.length) {
        html += `<div class="section-label">Definition <span class="source-badge wiktionary">Wiktionary</span></div><ol>`;
        for (const d of entry.definition) html += `<li>${d}</li>`;
        html += `</ol>`;
      } else if (defs.length) {
        html += `<div class="section-label">Definition <span class="source-badge wiktionary">Wiktionary</span></div><ol>`;
        for (const d of defs) html += `<li>${d}</li>`;
        html += `</ol>`;
      }
      html += `<div class="section-label">Etymology <span class="source-badge wiktionary">Wiktionary</span><span class="ety-confidence ${escapeHtml(etyConfidence.className)}">${escapeHtml(etyConfidence.label)}</span></div>`;
      html += `<div class="etymology-box">${renderLineage(lineage)}${escapeHtml(ety || "—")}</div>`;
      html += `<div class="ety-sources">Sources: ${etySources.map(s => escapeHtml(s)).join("; ")}</div>`;
      if (attestation) html += `<div class="attestation-note">Timeline: ${escapeHtml(attestation)}</div>`;
      // Nayiri panel
      const nayiriEntry = window.nayiriIndex && window.nayiriIndex[entry.title];
      if (nayiriEntry) {
        html += `<div class="section-label">Nayiri <span class="source-badge nayiri">Nayiri</span></div>`;
        html += `<div class="nayiri-panel">`;
        if (nayiriEntry.description) {
          // Extract just the parenthetical gloss if present
          const glossMatch = nayiriEntry.description.match(/\((.+)\)/);
          const gloss = glossMatch ? glossMatch[1] : nayiriEntry.description;
          html += `<div class="nayiri-gloss">${escapeHtml(gloss)}</div>`;
        }
        if (nayiriEntry.partOfSpeech) {
          html += `<div class="nayiri-pos">${escapeHtml(nayiriEntry.partOfSpeech.toLowerCase())}</div>`;
        }
        if (nayiriEntry.wordForms && nayiriEntry.wordForms.length) {
          const forms = [...new Set(nayiriEntry.wordForms)].slice(0, 12);
          html += `<div class="nayiri-forms-grid">`;
          for (const f of forms) html += `<span class="nayiri-form-pill">${escapeHtml(f)}</span>`;
          html += `</div>`;
        }
        html += `</div>`;
      }
      if (altForms.length) {
        html += `<div class="section-label">Alternative Forms</div>`;
        html += `<div class="word-links">`;
        for (const w of altForms) html += `<button type="button" class="word-link" data-word="${encodeURIComponent(w)}">${escapeHtml(w)}</button>`;
        html += `</div>`;
      }
      if (derivedTerms.length) {
        html += `<div class="section-label">Derived Terms</div>`;
        html += `<div class="word-links">`;
        for (const w of derivedTerms) html += `<button type="button" class="word-link" data-word="${encodeURIComponent(w)}">${escapeHtml(w)}</button>`;
        html += `</div>`;
      }
      if (relatedTerms.length) {
        html += `<div class="section-label">Related Terms</div>`;
        html += `<div class="word-links">`;
        for (const w of relatedTerms) html += `<button type="button" class="word-link" data-word="${encodeURIComponent(w)}">${escapeHtml(w)}</button>`;
        html += `</div>`;
      }
      if (seeAlso.length) {
        html += `<div class="section-label">See Also</div>`;
        html += `<div class="word-links">`;
        for (const w of seeAlso) html += `<button type="button" class="word-link" data-word="${encodeURIComponent(w)}">${escapeHtml(w)}</button>`;
        html += `</div>`;
      }
      html += `<div class="entry-meta">`;
      html += `<span class="meta-pill">${defs.length || (entry.definition?.length || 0)} defs</span>`;
      html += `<span class="meta-pill">ety ${escapeHtml(etyConfidence.label)}</span>`;
      if (attestation) html += `<span class="meta-pill">attestation ${escapeHtml(attestation)}</span>`;
      if (srcLangs.length) {
        for (const lang of srcLangs) {
          const encodedLang = encodeURIComponent(lang);
          html += `<button type="button" class="source-chip" data-lang="${encodedLang}">${escapeHtml(lang)}</button>`;
        }
      } else {
        html += `<span class="meta-pill">source unknown</span>`;
      }
      html += `</div>`;
      html += `</div></article>`;
      el.innerHTML = html;
      if (syncUrl) updateUrlState("word", entry.title);
    }
    window.lookup = lookup;
    function showSuggestions(q) {
      const box = document.getElementById("suggestions");
      if (!q) {
        box.style.display = "none";
        return;
      }
      const source = searchMode === "word" ? allTitles : sourceLanguageList;
      const matches = source
        .filter(t => t.toLowerCase().includes(q.toLowerCase()))
        .slice(0, 10);
      box.innerHTML = "";
      matches.forEach(m => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.textContent = m;
        div.addEventListener("mousedown", (e) => {
          e.preventDefault();
          if (searchMode === "word") {
            lookup(m, true);
          } else {
            lookupLanguage(m, true);
            document.getElementById("search").value = m;
          }
          box.style.display = "none";
        });
        box.appendChild(div);
      });
      box.style.display = "block";
    }
    function triggerRandomWordLookup() {
      const pool = allTitles.filter(Boolean);
      if (!pool.length) return false;
      let idx = Math.floor(Math.random() * pool.length);
      if (pool.length > 1 && currentWord) {
        const currentIdx = pool.indexOf(currentWord);
        if (currentIdx !== -1 && idx === currentIdx) {
          const step = 1 + Math.floor(Math.random() * (pool.length - 1));
          idx = (idx + step) % pool.length;
        }
      }
      const word = pool[idx];
      setMode("word");
      document.getElementById("search").value = word;
      lookup(word, true);
      return true;
    }
    function insertTextAtCursor(input, text) {
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      input.value = input.value.slice(0, start) + text + input.value.slice(end);
      const pos = start + text.length;
      input.setSelectionRange(pos, pos);
    }
    function runSearchFromInput() {
      const q = document.getElementById("search").value.trim();
      if (searchMode === "word") lookup(q, true);
      else lookupLanguage(q, true);
    }
    function renderArmenianKeyboard() {
      const panel = document.getElementById("armenianKeyboard");
      const rows = [
        ["է", "թ", "փ", "ձ", "ջ", "ր", "չ", "ճ", "ժ", "ծ", "ւ"],
        ["ք", "ո", "ե", "ռ", "տ", "ը", "ւ", "ի", "օ", "պ", "խ"],
        ["ա", "ս", "դ", "ֆ", "գ", "հ", "յ", "կ", "լ", ";", "՛"],
        ["զ", "ղ", "ց", "վ", "բ", "ն", "մ", "շ", "՞", "։", "և"]
      ];
      let html = "";
      rows.forEach(row => {
        html += `<div class="keyboard-row">`;
        row.forEach(ch => {
          html += `<button type="button" class="kbd-key" data-kbd-key="${escapeHtml(ch)}">${escapeHtml(ch)}</button>`;
        });
        html += `</div>`;
      });
      html += `<div class="keyboard-row">`;
      html += `<button type="button" class="kbd-key action" data-kbd-action="backspace">Back</button>`;
      html += `<button type="button" class="kbd-key action wide" data-kbd-action="space">Space</button>`;
      html += `<button type="button" class="kbd-key action" data-kbd-action="clear">Clear</button>`;
      html += `<button type="button" class="kbd-key action" data-kbd-action="search">Search</button>`;
      html += `</div>`;
      panel.innerHTML = html;
    }
    function loadDictionary() {
      fetch("western_armenian_wiktionary.json")
        .then(r => r.json())
        .then(data => {
          dictionary = data;
          for (const e of data) {
            titleIndex[e.title] = e;
          }
          allTitles = data.map(e => e.title);
          sourceLanguageList = [...new Set(data.flatMap(e => getSourceLanguages(e)))].sort();
          document.getElementById("count").textContent =
            data.length.toLocaleString() + " entries";
          document.getElementById("showGraphBtn").style.display = "block";
          document.getElementById("openLanguageTreeBtn").style.display = "block";
          applyStateFromUrl();
          if (graphVisible) {
            document.getElementById("showGraphBtn").click();
          }
          if (pendingRandomRequest) {
            pendingRandomRequest = false;
            triggerRandomWordLookup();
          }
        });
    }
    let searchTimeout = null;
    document.getElementById("search").addEventListener("input", e => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        showSuggestions(e.target.value.trim());
      }, 120);
    });
    document.getElementById("search").addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const q = e.target.value.trim();
        if (searchMode === "word") lookup(q, true);
        else lookupLanguage(q, true);
      }
    });
    document.getElementById("toggleKeyboardBtn").onclick = () => {
      const panel = document.getElementById("armenianKeyboard");
      const btn = document.getElementById("toggleKeyboardBtn");
      const open = panel.style.display === "block";
      panel.style.display = open ? "none" : "block";
      btn.setAttribute("aria-expanded", open ? "false" : "true");
      panel.setAttribute("aria-hidden", open ? "true" : "false");
      if (!open) document.getElementById("search").focus();
    };
    renderArmenianKeyboard();
    document.getElementById("wordSearchBtn").onclick = () => {
      setMode("word");
      updateUrlState("word", document.getElementById("search").value.trim());
    };
    document.getElementById("langSearchBtn").onclick = () => {
      setMode("language");
      updateUrlState("language", document.getElementById("search").value.trim());
    };
    document.getElementById("randomWordBtn").onclick = () => {
      if (!triggerRandomWordLookup()) {
        pendingRandomRequest = true;
        const countEl = document.getElementById("count");
        if (countEl && !countEl.textContent.trim()) {
          countEl.textContent = "Loading entries...";
        }
      }
    };
    async function openGraphSection() {
      const sec = document.getElementById("graphSection");
      const container = document.getElementById("graphContainer");
      sec.style.display = "block";
      graphVisible = true;
      if (!graphData) {
        try {
          graphData = await fetch("graph_web.json").then(r => r.json());
          graphIndex = buildGraphIndex();
          populateGraphLanguageOptions();
          syncGraphLanguagePanelSelections();
        } catch (err) {
          console.error("Failed to load graph data:", err);
          container.innerHTML = "<p>Could not load graph data.</p>";
          return;
        }
      }
      renderGraph(graphMode);
    }
    document.getElementById("showGraphBtn").onclick = () => {
      openGraphSection();
    };
    document.getElementById("openLanguageTreeBtn").onclick = () => {
      setGraphMode("language");
      openGraphSection();
      updateUrlState(searchMode, document.getElementById("search").value.trim());
    };
    document.getElementById("graphModeLanguageBtn").onclick = () => {
      setGraphMode("language");
      updateUrlState(searchMode, document.getElementById("search").value.trim());
      if (graphData) renderGraph(graphMode);
    };
    document.getElementById("graphModeLineageBtn").onclick = () => {
      setGraphMode("lineage");
      updateUrlState(searchMode, document.getElementById("search").value.trim());
      if (graphData) renderGraph(graphMode);
    };
    document.getElementById("graphModeTreeBtn").onclick = () => {
      setGraphMode("tree");
      updateUrlState(searchMode, document.getElementById("search").value.trim());
      if (graphData) renderGraph(graphMode);
    };
    document.getElementById("graphLangApplyBtn").onclick = () => {
      const checked = document.querySelectorAll(".graph-lang-checkbox:checked");
      applyGraphLanguageSelection([...checked].map(input => input.value));
    };
    document.getElementById("graphLangClearBtn").onclick = () => {
      graphSelectedLanguages = new Set();
      graphLanguageSearchTerm = "";
      document.getElementById("graphLangSearch").value = "";
      renderGraphLanguagePanel();
      updateGraphSelectedSummary();
      updateUrlState(searchMode, document.getElementById("search").value.trim());
      if (graphData) renderGraph(graphMode);
    };
    document.getElementById("graphLangSearch").addEventListener("input", e => {
      graphLanguageSearchTerm = e.target.value.trim();
      renderGraphLanguagePanel();
    });
    document.getElementById("graphLangSearch").addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        const checked = document.querySelectorAll(".graph-lang-checkbox:checked");
        applyGraphLanguageSelection([...checked].map(input => input.value));
      }
    });
    document.querySelectorAll("[data-graph-preset]").forEach(button => {
      button.addEventListener("click", () => {
        const raw = button.getAttribute("data-graph-preset") || "";
        const langs = raw.split("|").map(v => v.trim()).filter(Boolean);
        applyGraphLanguagePreset(langs);
      });
    });
    document.addEventListener("click", e => {
      if (!e.target.closest("#suggestions") && !e.target.closest("#search")) {
        document.getElementById("suggestions").style.display = "none";
      }
      if (e.target.classList.contains("kbd-key")) {
        const input = document.getElementById("search");
        const action = e.target.getAttribute("data-kbd-action");
        const key = e.target.getAttribute("data-kbd-key");
        if (action === "backspace") {
          const start = input.selectionStart ?? input.value.length;
          const end = input.selectionEnd ?? input.value.length;
          if (start !== end) {
            input.value = input.value.slice(0, start) + input.value.slice(end);
            input.setSelectionRange(start, start);
          } else if (start > 0) {
            input.value = input.value.slice(0, start - 1) + input.value.slice(end);
            input.setSelectionRange(start - 1, start - 1);
          }
          showSuggestions(input.value.trim());
          input.focus();
          return;
        }
        if (action === "space") {
          insertTextAtCursor(input, " ");
          showSuggestions(input.value.trim());
          input.focus();
          return;
        }
        if (action === "clear") {
          input.value = "";
          showSuggestions("");
          input.focus();
          return;
        }
        if (action === "search") {
          runSearchFromInput();
          input.focus();
          return;
        }
        if (key) {
          insertTextAtCursor(input, key);
          showSuggestions(input.value.trim());
          input.focus();
          return;
        }
      }
      if (e.target.classList.contains("source-chip")) {
        const lang = e.target.dataset.lang ? decodeURIComponent(e.target.dataset.lang) : "";
        if (!lang) return;
        setMode("language");
        document.getElementById("search").value = lang;
        lookupLanguage(lang, true);
      }
      if (e.target.classList.contains("lang-result-word")) {
        const w = e.target.dataset.word ? decodeURIComponent(e.target.dataset.word) : "";
        if (w) {
          setMode("word");
          document.getElementById("search").value = w;
          lookup(w, true);
        }
      }
      if (e.target.classList.contains("word-link")) {
        const w = e.target.dataset.word ? decodeURIComponent(e.target.dataset.word) : "";
        if (w) {
          setMode("word");
          document.getElementById("search").value = w;
          lookup(w, true);
        }
      }
      if (e.target.classList.contains("suggest-link")) {
        const w = e.target.dataset.word ? decodeURIComponent(e.target.dataset.word) : "";
        if (w) {
          setMode("word");
          document.getElementById("search").value = w;
          lookup(w, true);
        }
      }
      if (e.target.classList.contains("permalink-btn")) {
        const w = e.target.dataset.word ? decodeURIComponent(e.target.dataset.word) : "";
        if (!w) return;
        const url = new URL(window.location.href);
        url.searchParams.set("mode", "word");
        url.searchParams.set("q", w);
        copyToClipboard(url.toString())
          .then(() => {
            const status = document.getElementById("permalinkStatus");
            if (!status) return;
            status.textContent = "Link copied";
            setTimeout(() => {
              if (status.textContent === "Link copied") status.textContent = "";
            }, 1400);
          })
          .catch(() => {
            const status = document.getElementById("permalinkStatus");
            if (status) status.textContent = "Copy failed";
          });
      }
    });
    window.addEventListener("popstate", () => {
      if (!dictionary.length) return;
      applyStateFromUrl();
      if (graphVisible && graphData) {
        syncGraphLanguagePanelSelections();
        renderGraph(graphMode);
      }
    });
    loadDictionary();
    fetch("nayiri-armenian-lexicon-2026-02-15-v1%202.json")
      .then(r => r.json())
      .then(d => {
        // Build index: lemmaString → { description, partOfSpeech, wordForms }
        window.nayiriIndex = {};
        for (const lex of (d.lexemes || [])) {
          for (const lemma of (lex.lemmas || [])) {
            const key = lemma.lemmaString;
            if (key && !window.nayiriIndex[key]) {
              window.nayiriIndex[key] = {
                description: lex.description || "",
                partOfSpeech: lemma.partOfSpeech || "",
                wordForms: (lemma.wordForms || []).map(f => f.s)
              };
            }
          }
        }
      })
      .catch(err => console.error("Could not load Nayiri lexicon:", err));
  });
  </script>
</body>
</html>
