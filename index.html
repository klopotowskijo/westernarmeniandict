<script>
/* =========================
   STATE
========================= */

let dictionary = [];
let titleIndex = {};
let allTitles = [];
let searchMode = "word";

let graphData = null;
let network = null;

let etyCache = {};

/* =========================
   CLEAN ETYMOLOGY (FAST + SAFE)
========================= */

function cleanEtymology(text) {
  if (!text) return "";

  return text
    .replace(/\{\{[^}]+\}\}/g, "")
    .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, "$2")
    .replace(/\[\[([^\]]+)\]\]/g, "$1")
    .replace(/\s+/g, " ")
    .trim();
}

/* =========================
   PARSERS
========================= */

function parseDefinitions(wikitext) {
  // More robust: allow for possible whitespace after section header and before #
  const m = wikitext.match(/==Armenian==\s*\n([\s\S]*?)(?=\n==|$)/);
  if (!m) return [];

  return m[1]
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.startsWith("#"))
    .map(l => l.replace(/^#+/, "").trim());
}

function parsePOS(wikitext) {
  const m = wikitext.match(/==Armenian==\n([\s\S]*?)(?=\n==|$)/);
  if (!m) return "";

  if (m[1].includes("Noun")) return "noun";
  if (m[1].includes("Verb")) return "verb";
  if (m[1].includes("Adjective")) return "adjective";

  return "";
}

function parseEtymology(entry) {
  if (etyCache[entry.title]) return etyCache[entry.title];

  let t = entry.etymology?.[0]?.text || "";
  t = cleanEtymology(t);

  etyCache[entry.title] = t;
  return t;
}

/* =========================
   LOOKUP
========================= */

function lookup(word) {
  const entry = titleIndex[word];
  const el = document.getElementById("result");
  document.getElementById("suggestions").style.display = "none";

  el.style.display = "block";

  if (!entry) {
    el.innerHTML = `<div class="not-found">Not found: ${word}</div>`;
    return;
  }

  const defs = parseDefinitions(entry.wikitext || "");
  const pos = parsePOS(entry.wikitext || "");
  const ety = parseEtymology(entry);

  let html = `<div class="word-title">${entry.title}</div>`;
  if (pos) html += `<div class="word-pos">${pos}</div>`;

  if (defs.length) {
    html += `<div class="section-label">Definition</div><ol>`;
    for (const d of defs) html += `<li>${d}</li>`;
    html += `</ol>`;
  }

  html += `<div class="section-label">Etymology</div>
           <div class="etymology-box">${ety || "—"}</div>`;

  // Nayiri forms integration
  if (window.nayiriForms && window.nayiriForms[entry.title]) {
    const forms = window.nayiriForms[entry.title];
    html += `<div class="section-label">Nayiri Forms</div><ul class="nayiri-forms">`;
    for (const f of forms) html += `<li>${f}</li>`;
    html += `</ul>`;
  }

  el.innerHTML = html;
}

window.lookup = lookup;

/* =========================
   SUGGESTIONS (FIXED)
========================= */

function showSuggestions(q) {
  const box = document.getElementById("suggestions");
  if (!q) {
    box.style.display = "none";
    return;
  }

  const matches = allTitles
    .filter(t => t.toLowerCase().includes(q.toLowerCase()))
    .slice(0, 10);

  box.innerHTML = "";

  matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.textContent = m;

    div.addEventListener("mousedown", (e) => {
      // Use mousedown so it fires before input loses focus
      e.preventDefault();
      lookup(m);
      box.style.display = "none";
    });

    box.appendChild(div);
  });

  box.style.display = "block";
}

/* =========================
   INIT DICTIONARY
========================= */

function loadDictionary() {
  fetch("western_armenian_wiktionary.json")
    .then(r => r.json())
    .then(data => {
      dictionary = data;

      for (const e of data) {
        titleIndex[e.title] = e;
      }

      allTitles = data.map(e => e.title);

      document.getElementById("count").textContent =
        data.length.toLocaleString() + " entries";

      document.getElementById("showGraphBtn").style.display = "block";
    });
}

/* =========================
   SEARCH INPUT (DEBOUNCED)
========================= */

let searchTimeout = null;

document.getElementById("search").addEventListener("input", e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    showSuggestions(e.target.value.trim());
  }, 120);
});

document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") lookup(e.target.value.trim());
});

/* =========================
   MODE BUTTONS
========================= */

document.getElementById("wordSearchBtn").onclick = () => {
  searchMode = "word";
  document.getElementById("wordSearchBtn").classList.add("active");
  document.getElementById("langSearchBtn").classList.remove("active");
};

document.getElementById("langSearchBtn").onclick = () => {
  searchMode = "language";
  document.getElementById("langSearchBtn").classList.add("active");
  document.getElementById("wordSearchBtn").classList.remove("active");
};

/* =========================
   GRAPH
========================= */

document.getElementById("showGraphBtn").onclick = async () => {
  const sec = document.getElementById("graphSection");
  const container = document.getElementById("graphContainer");

  sec.style.display = "block";

  if (!graphData) {
    try {
      graphData = await fetch("graph_web.json").then(r => r.json());
    } catch (err) {
      console.error("Failed to load graph data:", err);
      container.innerHTML = "<p>Could not load graph data.</p>";
      return;
    }
  }

  const nodes = graphData.nodes.map((n, i) => ({
    id: i,
    label: n.id
  }));

  new vis.Network(container, { nodes, edges: [] }, {
    physics: true
  });
};

/* =========================
   OUTSIDE CLICK
========================= */

document.addEventListener("click", e => {
  // Always hide suggestions on any click outside suggestions
  if (!e.target.closest("#suggestions") && !e.target.closest("#search")) {
    document.getElementById("suggestions").style.display = "none";
  }
});

/* =========================
   LOAD
========================= */

loadDictionary();

/* =========================
   NAYIRI FORMS
========================= */

fetch("nayiri_forms.json")
  .then(r => r.json())
  .then(d => window.nayiriForms = d)
  .catch(err => console.error("Could not load nayiri_forms.json:", err));

</script>
