<body>
<div class="container">
  <h1>Արեւմտահայ Բառարան</h1>
  <div class="subtitle">Western Armenian Etymological Dictionary</div>
  <div class="count" id="count">Loading dictionary…</div>
  <div class="loading-spinner" id="loadingSpinner">
    <span class="spinner"></span>Searching…
  </div>
  <button id="showGraphBtn" style="display: none; margin-bottom: 20px; padding: 10px 20px; background: #8b1a1a; color: white; border: none; border-radius: 4px; cursor: pointer;">Show Language Tree Graph</button>

  <div class="search-wrap">

  <div class="placeholder" id="placeholder">
    🔍 Type a word to look it up

      <span onclick="lookup('ժամանակ')">ժամանակ</span>
      <span onclick="lookup('հայր')">հայր</span>
      <span onclick="lookup('մայր')">մայր</span>
      <span onclick="lookup('գիրք')">գիրք</span>
      <span onclick="lookup('սեր')">սեր</span>
    </div>
  </div>

  <div class="result" id="result"></div>
  
  <div class="graph-section" id="graphSection" style="display: none;">
    <h2>Language Tree Graph</h2>
    <div id="graphContainer"></div>
  </div>

<script>
let dictionary = [];
let titleIndex = {};
let allTitles = [];
let etymologyCache = {}; // Cache parsed etymologies
let searchMode = 'word'; // 'word' or 'language'
let dictionaryLoaded = false;
let searchTimeout = null;

// ========== FIXED: Convert Wiktionary templates to readable text ==========

function cleanEtymology(text) {
  if (!text) return null;
  
  let result = text;
  
  // ===== FIRST, EXTRACT WORDS FROM TEMPLATES BEFORE REMOVING THEM =====
  // {{m|hy|խահվէ}} → խահվէ
  result = result.replace(/\{\{m\|hy\|([^|}]+)[^}]*\}\}/g, '$1');
  // {{m|xcl|...}} → ...
  result = result.replace(/\{\{m\|xcl\|([^|}]+)[^}]*\}\}/g, '$1');
  // {{lang|hy|...}} → ...
  result = result.replace(/\{\{lang\|hy\|([^}]+)\}\}/g, '$1');
  // {{l|hy|...}} → ...
  result = result.replace(/\{\{l\|hy\|([^|}]+)[^}]*\}\}/g, '$1');

   // ===== EXTRACT NAMES FROM XLIT TEMPLATES =====
  result = result.replace(/\{\{xlit\|hy\|([^}]+)\}\}/g, '$1');
  result = result.replace(/\{\{xlit\|axm\|([^}]+)\}\}/g, '$1');
  result = result.replace(/\{\{xlit\|xcl\|([^}]+)\}\}/g, '$1');
 
  // ===== REMOVE REFERENCE/CITATION TEMPLATES =====
  result = result.replace(/\{\{R[^}]+\}\}/g, '');
  result = result.replace(/\{\{R\|[^}]+\}\}/g, '');
  result = result.replace(/\{\{R:[^}]+\}\}/g, '');
  result = result.replace(/\{\{citation[^}]+\}\}/g, '');
  result = result.replace(/\{\{Q[^}]+\}\}/g, '');
  result = result.replace(/\{\{w[^}]+\}\}/g, '');
  result = result.replace(/\{\{xlit[^}]+\}\}/g, '');
  
    // ===== REMOVE LANGUAGE COMPARISON TEMPLATES =====
  result = result.replace(/\{\{noncog[^}]+\}\}/g, '');
  // Keep Hungarian word from cog template
  result = result.replace(/\{\{cog\|hu\|([^}]+)\}\}/g, 'Hungarian $1');
  result = result.replace(/\{\{cog\|[^}]+\}\}/g, '');
  result = result.replace(/\{\{ncog[^}]+\}\}/g, '');
  
  // ===== CONVERT ETYMOLOGY TEMPLATES =====
  result = result.replace(/\{\{lbor\|hy\|xcl\|([^}]+)\}\}/g, 'Learned borrowing from Old Armenian $1');
  result = result.replace(/\{\{inh\|hy\|xcl\|([^}]+)\}\}/g, 'Inherited from Old Armenian $1');
  result = result.replace(/\{\{bor\|hy\|fa\|([^|]+)\|tr=([^}]+)\}\}/g, 'Borrowed from Persian $1 ($2)');
  result = result.replace(/\{\{bor\|hy\|ota\|([^|]+)\|tr=([^}]+)\}\}/g, 'Borrowed from Ottoman Turkish $1 ($2)');
  result = result.replace(/\{\{bor\|hy\|ru\|([^}]+)\}\}/g, 'Borrowed from Russian $1');
  result = result.replace(/\{\{bor\|hy\|fr\|([^}]+)\}\}/g, 'Borrowed from French $1');
  result = result.replace(/\{\{bor\|hy\|ar\|([^}]+)\}\}/g, 'Borrowed from Arabic $1');
  result = result.replace(/\{\{bor\|hy\|grc\|([^}]+)\}\}/g, 'Borrowed from Ancient Greek $1');
  result = result.replace(/\{\{der\|hy\|fa\|([^}]+)\}\}/g, 'From Persian $1');
  result = result.replace(/\{\{uder\|hy\|fa\|([^}]+)\}\}/g, 'From Persian $1');
  result = result.replace(/\{\{doublet\|hy\|([^}]+)\}\}/g, 'Doublet of $1');
  result = result.replace(/\{\{dbt\|hy\|([^}]+)\}\}/g, 'Doublet of $1');
  
  // ===== HANDLE SPECIAL WORDS =====
  result = result.replace(/\{\{unk\|hy\|title=unknown\}\}/g, 'unknown');
  result = result.replace(/\{\{onomatopoeic\|hy\|nocap=1\}\}/g, 'onomatopoeic');
  result = result.replace(/\{\{onomatopoeia\}\}/g, 'onomatopoeic');
  result = result.replace(/\{\{lit\|([^}]+)\}\}/g, 'literally "$1"');
  
  // ===== HANDLE AFFIX TEMPLATES =====
  result = result.replace(/\{\{af\|hy\|([^}]+)\}\}/g, (match, parts) => {
    const pieces = parts.split('|');
    return `from ${pieces.join(' + ')}`;
  });
  result = result.replace(/\{\{prefix\|hy\|([^|]+)\|([^}]+)\}\}/g, 'from $1- + $2');
  result = result.replace(/\{\{suffix\|hy\|([^|]+)\|([^}]+)\}\}/g, 'from $1 + -$2');
  result = result.replace(/\{\{compound\|hy\|([^}]+)\}\}/g, (match, parts) => {
    const pieces = parts.split('|');
    return `compound of ${pieces.join(' + ')}`;
  });
  
  // ===== REMOVE ANY REMAINING TEMPLATES =====
  result = result.replace(/\{\{[^}]+\}\}/g, '');
  
  // ===== CLEAN UP WIKI MARKUP =====
  result = result.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '$2');
  result = result.replace(/\[\[([^\]]+)\]\]/g, '$1');
  result = result.replace(/'{2,3}([^']+)'{2,3}/g, '$1');
  result = result.replace(/''/g, '');
  
  // ===== FIX SPACING =====
  result = result.replace(/\s+/g, ' ').trim();
  result = result.replace(/\s+\./g, '.');
  result = result.replace(/\.\s+\./g, '.');
  result = result.replace(/,\s*,/g, ',');
  
  // ===== FIX "From from" =====
  result = result.replace(/From\s+from/, 'From');
  result = result.replace(/from\s+from/, 'from');
  
  // ===== ADD SPACES AFTER PERIODS =====
  result = result.replace(/\.([A-Z])/g, '. $1');
  
  return result.length > 5 ? result : null;
}
// ========== Parse functions ==========

function parseDefinitions(wikitext) {
  // Only extract definitions from the Armenian section (not Old Armenian)
  const armenianMatch = wikitext.match(/==Armenian==([\s\S]*?)(?:==\w|$)/);
  if (!armenianMatch) return [];
  
  const armenianSection = armenianMatch[1];
  const lines = armenianSection.split('\n');
  const defs = [];
  
  for (const line of lines) {
    if (line.match(/^#[^#:*]/)) {
      let def = line.slice(1).trim();
      // Extract text from [[link]] and {{templates}}
      def = def.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '$2');  // [[word|text]] -> text
      def = def.replace(/\[\[([^\]]+)\]\]/g, '$1');              // [[word]] -> word
      def = def.replace(/\{\{lb\|hy\|[^}]*\}\}/g, '');           // Remove language tags
      def = def.replace(/\{\{[^}]*\}\}/g, '');                   // Remove all other templates
      def = def.replace(/'{2,3}([^']+)'{2,3}/g, '$1');           // Remove bold/italic
      def = def.replace(/[\[\]{}]/g, '');                        // Remove any remaining brackets/braces
      def = def.trim();
      if (def.length > 1) {  // Only add if more than just punctuation
        defs.push(def);
      }
    }
  }
  console.log('Extracted definitions from Armenian section:', defs);
  return defs;
}

function parsePOS(wikitext) {
  // Only look at Armenian section for POS
  const armenianMatch = wikitext.match(/==Armenian==([\s\S]*?)(?:==\w|$)/);
  const searchWikitext = armenianMatch ? armenianMatch[1] : wikitext;
  
  const posMap = {
    'Noun': 'noun', 'Verb': 'verb', 'Adjective': 'adjective',
    'Adverb': 'adverb', 'Pronoun': 'pronoun', 'Conjunction': 'conjunction',
    'Preposition': 'preposition', 'Interjection': 'interjection',
    'Particle': 'particle', 'Numeral': 'numeral', 'Phrase': 'phrase',
    'Proper noun': 'proper noun', 'Suffix': 'suffix', 'Prefix': 'prefix',
  };
  for (const [label, display] of Object.entries(posMap)) {
    if (new RegExp(`={3,4}${label}={3,4}`).test(searchWikitext)) {
      return display;
    }
  }
  return '';
}

function parseEtymology(entry) {
  // Check cache first
  if (etymologyCache[entry.title]) {
    return etymologyCache[entry.title];
  }
  
  let result = null;
  
  // First try stored etymology
  if (entry.etymology && entry.etymology.length > 0) {
    const text = entry.etymology[0].text || '';
    // Filter out incomplete etymologies (just punctuation or placeholder text)
    if (text && text.length > 3 && !text.match(/^[\s.,:;-]+$/) && text !== 'Etymology needs further research.') {
      result = text;
    }
  }
  
  // Then try parsing from wikitext - only Armenian section
  if (!result) {
    const wikitext = entry.wikitext || '';
    const armenianMatch = wikitext.match(/==Armenian==([\s\S]*?)(?:==\w|$)/);
    const searchWikitext = armenianMatch ? armenianMatch[1] : wikitext;
    const etyMatch = searchWikitext.match(/===Etymology===\n([\s\S]*?)(?=\n===|$)/);
    if (etyMatch) {
      let ety = etyMatch[1].trim();
      const cleaned = cleanEtymology(ety);
      if (cleaned && cleaned.length > 3 && !cleaned.match(/^[\s.,:;-]+$/)) {
        result = cleaned;
      }
    }
  }
  
  // Cache the result
  if (result) {
    etymologyCache[entry.title] = result;
  }
  
  return result;
}

// ========== Lookup & render ==========

function lookup(word) {
  word = word.trim();
  console.log('Looking up word:', word, 'exists in titleIndex:', word in titleIndex);
  document.getElementById('search').value = word;
  hideSuggestions();
  document.getElementById('placeholder').style.display = 'none';

  const entry = titleIndex[word];
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';

  if (!entry) {
    console.log('Entry not found for:', word);
    resultEl.innerHTML = `<div class="not-found">❌ "<strong>${word}</strong>" was not found in the dictionary.</div>`;
    return;
  }
  console.log('Entry found, displaying...');

  const defs = parseDefinitions(entry.wikitext || '');
  const pos = parsePOS(entry.wikitext || '');
  const ety = parseEtymology(entry);

  let html = `<div class="word-title">${entry.title}</div>`;
  if (pos) html += `<div class="word-pos">${pos}</div>`;

  if (defs.length > 0) {
    html += `<div class="section-label">Definition</div>`;
    html += `<div class="definitions"><ol>${defs.map(d => `<li>${d}</li>`).join('')}</ol></div>`;
  }

  if (ety) {
    html += `<div class="section-label">Etymology</div>`;
    html += `<div class="etymology-box">${ety}</div>`;
  } else {
    html += `<div class="section-label">Etymology</div>`;
    html += `<div class="etymology-box">No etymology recorded</div>`;
  }

  resultEl.innerHTML = html;
}

// ========== Autocomplete ==========

function showSuggestions(query) {
  const sugEl = document.getElementById('suggestions');
  console.log('showSuggestions called with query:', query, 'dictionaryLoaded:', dictionaryLoaded, 'allTitles length:', allTitles.length);
  if (!query || !dictionaryLoaded) { 
    console.log('Exiting early: query empty or not loaded');
    hideSuggestions(); 
    return; 
  }
  
  // Show loading indicator during search
  const spinnerEl = document.getElementById('loadingSpinner');
  spinnerEl.classList.add('active');
  
  let matches = [];
  const lowerQuery = query.toLowerCase();
  console.log('Looking for:', lowerQuery, 'in', allTitles.length, 'titles');
  
  try {
    if (searchMode === 'word') {
      // Word search - substring match
      console.log('Word search mode');
      matches = allTitles.filter(t => t.toLowerCase().includes(lowerQuery)).slice(0, 8);
      console.log('Word search found', matches.length, 'matches');
    } else {
      // Language search - search in etymologies and source language
      matches = dictionary.filter(entry => {
        // Check source_language field
        if (entry.etymology && entry.etymology.length > 0) {
          const sourceLang = entry.etymology[0].source_language || '';
          if (sourceLang.toLowerCase().includes(lowerQuery)) {
            return true;
          }
        }
        
        // Also check etymology text
        const ety = parseEtymology(entry);
        if (ety && ety.toLowerCase().includes(lowerQuery)) {
          return true;
        }
        
        return false;
      }).map(entry => entry.title).slice(0, 20); // Show up to 20 results for language search
    }
  } catch (e) {
    console.error('Search error:', e);
  }
  
  spinnerEl.classList.remove('active'); // Hide spinner when done
  
  console.log('Search matches found:', matches.length, 'matches:', matches.slice(0, 3));
  if (matches.length === 0) { 
    console.log('No matches found');
    hideSuggestions(); 
    return; 
  }
  sugEl.innerHTML = matches.map(m =>
    `<div class="suggestion" onclick="lookup('${m}')">${m}</div>`
  ).join('');
  sugEl.style.display = 'block';
  console.log('Suggestions displayed');
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

// ========== Load data ==========

// Try to load from localStorage cache first for instant repeated visits
const CACHE_KEY = 'armenian_dict_v2';
const CACHE_TIME_KEY = 'armenian_dict_time';

function loadDictionary() {
  // Skip localStorage caching due to size limits - fetch fresh each time
  console.log('Starting dictionary load...');
  fetch('western_armenian_wiktionary.json')
    .then(r => {
      console.log('Fetch status:', r.status, r.statusText);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      console.log('Dictionary loaded with', data.length, 'entries');
      initializeDictionary(data, 'fresh');
    })
    .catch(error => {
      console.error('Dictionary load failed:', error);
      document.getElementById('count').textContent = 'Failed to load dictionary: ' + error.message;
    });
}

function initializeDictionary(data, source) {
  console.log('Initializing dictionary with', data.length, 'entries');
  dictionary = data;
  dictionaryLoaded = true;
  for (const entry of data) {
    titleIndex[entry.title] = entry;
  }
  allTitles = data.map(e => e.title).sort();
  console.log('Dictionary ready, titleIndex has', Object.keys(titleIndex).length, 'entries');
  console.log('allTitles array has', allTitles.length, 'entries');
  console.log('First 5 titles:', allTitles.slice(0, 5));
  
  let statusText = `${data.length.toLocaleString()} entries · 100% etymologies`;
  if (source === 'cached') statusText += ' (cached)';
  document.getElementById('count').textContent = statusText;
  document.getElementById('showGraphBtn').style.display = 'block';
  
  // Now initialize event listeners
  console.log('Setting up event listeners...');
  const searchEl = document.getElementById('search');
  const wordSearchBtn = document.getElementById('wordSearchBtn');
  const langSearchBtn = document.getElementById('langSearchBtn');
  
  console.log('DOM elements: searchEl=', !!searchEl, 'wordSearchBtn=', !!wordSearchBtn, 'langSearchBtn=', !!langSearchBtn);
  
  if (wordSearchBtn && langSearchBtn) {
    console.log('Setting up button listeners');
    wordSearchBtn.addEventListener('click', () => {
      searchMode = 'word';
      wordSearchBtn.classList.add('active');
      langSearchBtn.classList.remove('active');
      searchEl.placeholder = "Search a word… e.g. ժամանակ, հայր, մայր";
      hideSuggestions();
      searchEl.value = '';
      document.getElementById('result').style.display = 'none';
      document.getElementById('placeholder').style.display = 'block';
    });

    langSearchBtn.addEventListener('click', () => {
      searchMode = 'language';
      langSearchBtn.classList.add('active');
      wordSearchBtn.classList.remove('active');
      searchEl.placeholder = "Search by origin language… e.g. turkish, greek, persian";
      hideSuggestions();
      searchEl.value = '';
      document.getElementById('result').style.display = 'none';
      document.getElementById('placeholder').style.display = 'block';
    });
    console.log('Button listeners attached');
  }

  if (searchEl) {
    console.log('Setting up search input listener');
    searchEl.addEventListener('input', () => {
      console.log('Search input event:', searchEl.value);
      if (searchTimeout) clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const trimmed = searchEl.value.trim();
        console.log('Calling showSuggestions with:', trimmed);
        showSuggestions(trimmed);
      }, 150);
    });

    searchEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const query = searchEl.value.trim();
        if (searchMode === 'word') {
          lookup(query);
        } else {
          const matches = dictionary.filter(entry => {
            const ety = parseEtymology(entry);
            return ety && ety.toLowerCase().includes(query.toLowerCase());
          });
          if (matches.length > 0) {
            lookup(matches[0].title);
          }
        }
      }
      if (e.key === 'Escape') hideSuggestions();
    });
    console.log('Search input listener attached');
  } else {
    console.error('ERROR: Search input element not found!');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) hideSuggestions();
  });
  
  console.log('Event listeners setup complete');
}

loadDictionary();

// Load and render graph
let graphData = null;
let network = null;

document.getElementById('showGraphBtn').addEventListener('click', () => {
  if (graphData) {
    showGraph();
  } else {
    fetch('graph_web.json')
      .then(r => r.json())
      .then(data => {
        graphData = data;
        showGraph();
      })
      .catch(() => {
        alert('Failed to load graph data.');
      });
  }
});

function showGraph() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('graphSection').style.display = 'block';
  
  if (network) return; // Already rendered
  
  const container = document.getElementById('graphContainer');
  
  // Prepare nodes and edges
  const nodes = [];
  const edges = [];
  const langColors = {
    'Classical Armenian': '#8b1a1a',
    'Persian': '#ff6b35',
    'Turkish': '#f7931e',
    'Greek': '#0066cc',
    'Russian': '#cc0000',
    'French': '#0099ff',
    'Arabic': '#660099',
    'Latin': '#666666'
  };
  
  // Add language nodes
  const languages = [...new Set(graphData.nodes.map(n => n.source_language).filter(l => l))];
  languages.forEach((lang, i) => {
    nodes.push({
      id: `lang_${i}`,
      label: lang,
      color: langColors[lang] || '#999999',
      shape: 'box',
      size: 25
    });
  });
  
  // Add word nodes and edges
  graphData.nodes.forEach((node, i) => {
    nodes.push({
      id: `word_${i}`,
      label: node.id,
      color: '#f5f0e8',
      shape: 'circle',
      size: 15
    });
    
    if (node.source_language) {
      const langIndex = languages.indexOf(node.source_language);
      if (langIndex >= 0) {
        edges.push({
          from: `lang_${langIndex}`,
          to: `word_${i}`,
          arrows: 'to'
        });
      }
    }
  });
  
  const data = { nodes: nodes, edges: edges };
  const options = {
    physics: {
      enabled: true,
      barnesHut: {
        gravitationalConstant: -2000,
        centralGravity: 0.3,
        springLength: 95,
        springConstant: 0.04
      }
    },
    nodes: {
      font: { size: 12 }
    },
    edges: {
      color: '#c8b89a'
    }
  };
  
  network = new vis.Network(container, data, options);
}

// ========== Make lookup globally accessible ==========

window.lookup = lookup;
</script>
